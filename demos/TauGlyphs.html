<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tau-Tongue Glyphs</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      max-width: 1600px;
      margin: 0 auto;
    }

    @media (min-width: 900px) {
      .container {
        grid-template-columns: 1fr 1fr;
        align-items: start;
      }
    }

    .header {
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #c084fc, #818cf8, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: #888;
      font-size: 1.1rem;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .controls textarea {
      width: 100%;
      min-height: 120px;
      padding: 1rem;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      resize: vertical;
      transition: border-color 0.2s;
    }

    .controls textarea:focus {
      border-color: #818cf8;
    }

    .sigil-stage {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111122;
      border: 1px solid #222;
      border-radius: 12px;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
    }

    .sigil-stage canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .equation-display {
      padding: 1.5rem;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      color: #c084fc;
      word-break: break-all;
      min-height: 3rem;
      line-height: 1.5;
    }
    
    .interpretation {
      margin-top: 1.5rem;
      padding: 1.5rem;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #a0a0b0;
      line-height: 1.6;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <div class="header">
        <h1>Tau-Tongue Glyphs</h1>
        <p>Visual art from symbolic algebra</p>
      </div>

      <div class="controls">
        <textarea id="spark-input" placeholder="Type a spark phrase to generate a glyph in real-time..."></textarea>
      </div>

      <div class="equation-display" id="equation-output">
        Enter a spark to see its symbolic equation...
      </div>
      
      <div class="interpretation" id="interpretation-output" style="display: none;">
      </div>
    </div>

    <div class="right-panel">
      <div class="sigil-stage">
        <canvas id="sigil-canvas" width="2048" height="2048"></canvas>
      </div>
    </div>
  </div>

  <!-- Include the bundled Tau-Tongue library -->
  <script src="tau-tongue.bundle.js"></script>
  <script>
    const input = document.getElementById('spark-input');
    const canvas = document.getElementById('sigil-canvas');
    const ctx = canvas.getContext('2d');
    const equationOutput = document.getElementById('equation-output');
    const interpretationOutput = document.getElementById('interpretation-output');

    // Initialize interpreter
    const interpreter = new TauTongue.TauTongueInterpreter();

    const colors = {
      1: '#ef4444', // Red
      2: '#f97316', // Orange
      3: '#eab308', // Yellow
      4: '#22c55e', // Green
      5: '#3b82f6', // Blue
      6: '#6366f1', // Indigo
      7: '#a855f7', // Violet
      8: '#ec4899', // Pink
      9: '#ca8a04', // Gold
      11: '#06b6d4', // Cyan
      22: '#f8fafc'  // White
    };

    function drawNode(x, y, radius, text, bgColor, textColor, strokeColor = '#333') {
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = bgColor;
      ctx.fill();
      ctx.lineWidth = 6;
      ctx.strokeStyle = strokeColor;
      ctx.stroke();

      ctx.fillStyle = textColor;
      // Adjust font size based on text length and radius
      let fontSize = radius * 0.8;
      if (text.length > 1) fontSize = radius * 0.6;
      ctx.font = `bold ${fontSize}px 'Segoe UI', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, x, y);
    }

    function drawSigil(result) {
      // Clear canvas
      ctx.fillStyle = '#111122';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      const eq = result.symbolicEquation;
      const outerOp = eq.charAt(0);
      const digitalSum = result.digitalSum;
      const braid = result.braid;

      const centerColor = colors[digitalSum] || '#888';

      const numSpokes = braid.length;
      const angleStep = (Math.PI * 2) / numSpokes;

      const level1Nodes = [];

      // Calculate Level 1 nodes
      braid.forEach((item, i) => {
        const angle = i * angleStep - Math.PI / 2;
        const op = item.equation.charAt(0);
        
        const match = item.equation.match(/\((.*?)\)/);
        const paramsStr = match ? match[1] : '';
        const params = paramsStr.split(',').map(Number).filter(n => !isNaN(n));
        
        const paramSum = params.reduce((a, b) => a + b, 0);
        const dr = TauTongue.calculateDigitalRoot(paramSum.toString()) || 1;

        const spokeLength = 250 + dr * 20;
        const nx = cx + Math.cos(angle) * spokeLength;
        const ny = cy + Math.sin(angle) * spokeLength;
        
        const radius = 40 + dr * 3;

        level1Nodes.push({ x: nx, y: ny, radius, op, params, angle, dr });

        const nodeColor = colors[dr] || centerColor;

        // Draw Level 1 spoke
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(nx, ny);
        ctx.lineWidth = 8;
        ctx.strokeStyle = nodeColor;
        ctx.stroke();
      });

      // Draw Level 2 spokes and nodes
      level1Nodes.forEach(node => {
        const numParams = node.params.length;
        if (numParams === 0) return;

        const spreadAngle = Math.PI * 1.2;
        const startAngle = node.angle - spreadAngle / 2;
        const paramAngleStep = numParams > 1 ? spreadAngle / (numParams - 1) : 0;

        node.params.forEach((p, j) => {
          const pAngle = numParams === 1 ? node.angle : startAngle + j * paramAngleStep;
          
          const pSpokeLength = node.radius + 40 + p * 15;
          const px = node.x + Math.cos(pAngle) * pSpokeLength;
          const py = node.y + Math.sin(pAngle) * pSpokeLength;

          const pRadius = 20 + p * 2;
          const pColor = colors[p] || '#aaa';

          // Draw Level 2 spoke
          ctx.beginPath();
          ctx.moveTo(node.x, node.y);
          ctx.lineTo(px, py);
          ctx.lineWidth = 4;
          ctx.strokeStyle = pColor;
          ctx.stroke();

          // Draw Level 2 node
          drawNode(px, py, pRadius, p.toString(), '#1a1a2e', pColor, pColor);
        });
      });

      // Draw Level 1 nodes
      level1Nodes.forEach(node => {
        const nodeColor = colors[node.dr] || centerColor;
        drawNode(node.x, node.y, node.radius, node.op, '#1a1a2e', nodeColor, nodeColor);
      });

      // Draw Center node
      drawNode(cx, cy, 150, outerOp, centerColor, '#111', '#fff');
    }

    function updateGlyph() {
      const spark = input.value.trim();
      if (!spark) {
        // Clear canvas and reset UI if empty
        ctx.fillStyle = '#111122';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#334';
        ctx.font = "40px 'Segoe UI'";
        ctx.textAlign = 'center';
        ctx.fillText("Awaiting Spark...", canvas.width/2, canvas.height/2);
        
        equationOutput.textContent = "Enter a spark to see its symbolic equation...";
        interpretationOutput.style.display = 'none';
        return;
      }
      
      try {
        const result = interpreter.interpret(spark);
        
        // Update UI
        equationOutput.innerHTML = `<strong>Equation:</strong><br/>${result.symbolicEquation}<br/><br/><strong>Digital Sum:</strong> ${result.digitalSum} (${result.archetype})`;
        
        interpretationOutput.style.display = 'block';
        interpretationOutput.textContent = result.narrativeInterpretation;

        // Draw Sigil
        drawSigil(result);
      } catch (err) {
        equationOutput.textContent = `Error: ${err.message}`;
        console.error(err);
      }
    }

    input.addEventListener('input', updateGlyph);
    
    // Initial draw
    updateGlyph();
  </script>
</body>
</html>
