<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tau-Tongue Interpreter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: visible;
      margin-bottom: 2rem;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 2rem;
      text-align: center;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .header p {
      opacity: 0.9;
      font-size: 1.1rem;
    }

    .controls {
      padding: 2rem;
      background: #f8f9fa;
      border-bottom: 2px solid #e9ecef;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #495057;
    }

    textarea {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      border: 2px solid #dee2e6;
      border-radius: 6px;
      transition: border-color 0.3s;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 1rem 2rem;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .download-btn {
      background: linear-gradient(135deg, #20c997 0%, #0ca678 100%);
      margin-top: 1rem;
      display: none;
    }

    .download-btn:hover {
      box-shadow: 0 4px 12px rgba(12, 166, 120, 0.4);
    }

    .download-json-btn {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      margin-top: 1rem;
      display: none;
    }

    .download-json-btn:hover {
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
    }

    .download-btn-container {
      padding: 0 2rem 1rem 2rem;
    }

    .output {
      padding: 2rem;
    }

    .output:empty::before {
      content: "Enter a spark and interpret to see results...";
      color: #adb5bd;
      font-style: italic;
      display: block;
      text-align: center;
      padding-top: 4rem;
      font-size: 1.1rem;
    }

    .result-section {
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .result-section h2 {
      color: #667eea;
      margin-bottom: 1rem;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .field {
      margin-bottom: 1rem;
      padding: 0.75rem;
      background: white;
      border-radius: 4px;
    }

    .field-label {
      font-weight: 600;
      color: #495057;
      margin-bottom: 0.25rem;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field-value {
      color: #212529;
      font-size: 1.05rem;
      word-wrap: break-word;
    }

    .field-value.code {
      font-family: 'Courier New', monospace;
      background: #f1f3f5;
      padding: 0.75rem;
      border-radius: 4px;
      overflow-x: auto;
      white-space: pre-wrap;
    }

    .field-value.array {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .array-item {
      background: #e7f5ff;
      color: #1864ab;
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-weight: 600;
    }

    .braid-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .braid-item {
      background: white;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      padding: 0.75rem;
    }

    .braid-item.has-inflection {
      border-color: #fab005;
      background: #fff9db;
    }

    .braid-equation {
      font-family: 'Courier New', monospace;
      color: #495057;
      margin-bottom: 0.5rem;
      background: #f8f9fa;
      padding: 0.5rem;
      border-radius: 3px;
    }

    .braid-item.has-inflection .braid-equation {
      background: #fff3bf;
    }

    .braid-description {
      color: #666;
      font-size: 0.95rem;
    }

    .braid-micro-crucible {
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid #e9ecef;
      font-size: 0.9rem;
      color: #495057;
    }

    .braid-micro-crucible code {
      background: #e7f5ff;
      color: #1864ab;
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
    }

    .braid-dominant {
      font-weight: bold;
      color: #667eea;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }

    .braid-texture {
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid #e9ecef;
      font-size: 0.85rem;
      color: #6c757d;
    }

    .braid-texture-label {
      font-weight: 600;
      margin-right: 0.5rem;
    }

    .texture-item {
      display: inline;
      color: #495057;
    }

    .inflection-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .inflection-item {
      background: #fff3bf;
      border: 1px solid #fab005;
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      font-size: 0.95rem;
    }

    .inflection-empty {
      color: #868e96;
      font-style: italic;
      padding: 0.5rem;
    }

    .error {
      background: #ffe3e3;
      border-left: 4px solid #fa5252;
      padding: 1rem;
      border-radius: 4px;
      color: #c92a2a;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #868e96;
    }

    .loading::after {
      content: '...';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔮 Tau-Tongue Interpreter</h1>
      <p>Transform text into symbolic narrative equations</p>
    </div>

    <div class="controls">
      <form id="interpreterForm">
        <div class="form-group">
          <label for="spark">Enter Your Spark</label>
          <textarea 
            id="spark" 
            name="spark" 
            placeholder="Enter any text to interpret..."
            required
          ></textarea>
        </div>

        <button type="submit">Interpret</button>
      </form>
    </div>

    <div class="download-btn-container">
      <button class="download-btn" id="downloadBtnTop">📥 Download Markdown</button>
      <button class="download-json-btn" id="downloadJsonBtnTop">📦 Download JSON</button>
    </div>

    <div class="output" id="output"></div>

    <div class="download-btn-container">
      <button class="download-btn" id="downloadBtnBottom">📥 Download Markdown</button>
      <button class="download-json-btn" id="downloadJsonBtnBottom">📦 Download JSON</button>
    </div>
  </div>

  <script type="module">
    import { TauTongueInterpreter, calculateDigitalRoot } from '../dist/index.js';

    const form = document.getElementById('interpreterForm');
    const output = document.getElementById('output');
    const sparkInput = document.getElementById('spark');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const spark = sparkInput.value.trim();

      if (!spark) {
        showError('Please enter some text to interpret');
        return;
      }

      try {
        showLoading();
        
        // Small delay to show loading state
        await new Promise(resolve => setTimeout(resolve, 50));

        const interpreter = new TauTongueInterpreter();
        const result = interpreter.interpret(spark);
        
        renderResult(result);

      } catch (error) {
        showError(error.message);
        console.error('Interpretation error:', error);
      }
    });

    function showLoading() {
      output.innerHTML = '<div class="loading">Interpreting</div>';
    }

    function showError(message) {
      output.innerHTML = `<div class="error"><strong>Error:</strong> ${message}</div>`;
    }

    function generateMarkdown(result) {
      let md = `# Tau-Tongue Interpretation\n\n`;
      
      // Input & Basic Info
      md += `## Input & Basic Info\n\n`;
      md += `**Input:** ${result.input}\n\n`;
      md += `**Word Count:** ${result.wordCount}\n\n`;
      md += `**Character Count:** ${result.charCount}\n\n`;
      
      // Numerical Analysis
      md += `## Numerical Analysis\n\n`;
      md += `**Numero Cipher:** ${result.numeroCipher.join(', ')}\n\n`;

      md += `**Digital Sum:** ${result.digitalSum}\n\n`;
      
      // Archetypal Resonance
      md += `## Archetypal Resonance\n\n`;
      md += `**Resonance:** ${result.resonance}\n\n`;
      md += `**Resonance Meaning:** ${result.resonanceMeaning}\n\n`;
      md += `**Archetype:** ${result.archetype}\n\n`;
      md += `**Archetype Description:** ${result.archetypeDescription}\n\n`;
      
      // Symbolic Equation
      md += `## Symbolic Equation\n\n`;
      md += `\`\`\`\n${result.symbolicEquation}\n\`\`\`\n\n`;
      md += `**Crucible:** \`${result.crucible}\`\n\n`;
      md += `**Crucible Description:** ${result.crucibleDescription}\n\n`;
      
      // Antagonist
      md += `## Antagonist\n\n`;
      md += `**Braid:** \`${result.antagonist.braid}\`\n\n`;
      md += `**Description:** ${result.antagonist.description}\n\n`;
      md += `**Crucible:** \`${result.antagonist.crucible}\`\n\n`;
      md += `**Archetype:** ${result.antagonist.archetype}\n\n`;
      md += `**Archetype Description:** ${result.antagonist.archetypeDescription}\n\n`;
      md += `**Resonance:** ${result.antagonist.resonance}\n\n`;
      md += `**Resonance Meaning:** ${result.antagonist.resonanceMeaning}\n\n`;
      
      // Braid Interpretation
      md += `## Braid Interpretation\n\n`;
      const interpreter = new TauTongueInterpreter();
      result.braid.forEach((b, i) => {
        md += `### Braid ${i + 1}${b.hasInflectionPoint ? ' (Inflection Point)' : ''}\n\n`;
        
        // Extract narrative palette
        let narrativePalette = null;
        try {
          narrativePalette = interpreter.extractNarrativePalette(b.equation);
        } catch (e) {
          console.warn('Could not extract narrative palette:', e);
        }
        
        if (narrativePalette) {
          md += `**${narrativePalette.dominant.toUpperCase()}**\n\n`;
        }
        
        md += `**Equation:** \`${b.equation}\`\n\n`;
        md += `**Description:** ${b.description}\n\n`;
        
        const microCrucible = interpreter.getMicroCrucible(b.equation);
        if (microCrucible) {
          md += `**Micro-Crucible:** \`${microCrucible}\`\n\n`;
        }
        
        if (narrativePalette) {
          const allFunctions = [
            { function: narrativePalette.dominant, weight: narrativePalette.dominantWeight },
            ...narrativePalette.texture
          ];
          const textureList = allFunctions.map(t => 
            `${t.function}(${Math.round(t.weight * 100)}%)`
          ).join(', ');
          md += `**Narrative Texture:** ${textureList}\n\n`;
        }
      });
      
      // Inflection Points
      md += `## Inflection Points\n\n`;
      if (result.inflectionPoints.length > 0) {
        result.inflectionPoints.forEach(ip => {
          md += `- Braid ${ip.braidIndex + 1}, Position ${ip.digitIndex + 1}: Digit **${ip.digit}** resonates with interference wave **${ip.interferenceDigit}**\n`;
        });
        md += `\n`;
      } else {
        md += `No interference patterns detected\n\n`;
      }
      
      // Interpretations
      md += `## Symbolic Interpretation\n\n`;
      md += `${result.interpretation}\n\n`;
      md += `## Narrative Interpretation\n\n`;
      md += `${result.narrativeInterpretation}\n`;
      
      return md;
    }

    function downloadMarkdown(result) {
      const markdown = generateMarkdown(result);
      const blob = new Blob([markdown], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `tau-tongue-${result.input.slice(0, 30).replace(/[^a-zA-Z0-9]/g, '-')}.md`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function downloadJSON(result) {
      const json = JSON.stringify(result, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `tau-tongue-${result.input.slice(0, 30).replace(/[^a-zA-Z0-9]/g, '-')}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function renderResult(result) {
      // Show download buttons
      document.querySelectorAll('.download-btn').forEach(btn => {
        btn.style.display = 'block';
        btn.onclick = () => downloadMarkdown(result);
      });

      document.querySelectorAll('.download-json-btn').forEach(btn => {
        btn.style.display = 'block';
        btn.onclick = () => downloadJSON(result);
      });

      const html = `
        <div class="result-section">
          <h2>📝 Input & Basic Info</h2>
          
          <div class="field">
            <div class="field-label">Input (input)</div>
            <div class="field-value">${escapeHtml(result.input)}</div>
          </div>

          <div class="field">
            <div class="field-label">Word Count (wordCount)</div>
            <div class="field-value">${result.wordCount}</div>
          </div>

          <div class="field">
            <div class="field-label">Character Count (charCount)</div>
            <div class="field-value">${result.charCount}</div>
          </div>
        </div>

        <div class="result-section">
          <h2>🔢 Numerical Analysis</h2>
          
          <div class="field">
            <div class="field-label">Numero Cipher (numeroCipher)</div>
            <div class="field-value array">
              ${result.numeroCipher.map(n => `<span class="array-item">${n}</span>`).join('')}
            </div>
          </div>



          <div class="field">
            <div class="field-label">Digital Sum (digitalSum)</div>
            <div class="field-value">${result.digitalSum}</div>
          </div>
        </div>

        <div class="result-section">
          <h2>✨ Archetypal Resonance</h2>
          
          <div class="field">
            <div class="field-label">Resonance (resonance)</div>
            <div class="field-value">${result.resonance}</div>
          </div>

          <div class="field">
            <div class="field-label">Resonance Meaning (resonanceMeaning)</div>
            <div class="field-value">${result.resonanceMeaning}</div>
          </div>

          <div class="field">
            <div class="field-label">Archetype (archetype)</div>
            <div class="field-value">${result.archetype}</div>
          </div>

          <div class="field">
            <div class="field-label">Archetype Description (archetypeDescription)</div>
            <div class="field-value">${result.archetypeDescription}</div>
          </div>
        </div>

        <div class="result-section">
          <h2>⚡ Symbolic Equation</h2>
          
          <div class="field">
            <div class="field-label">Symbolic Equation (symbolicEquation)</div>
            <div class="field-value code">${escapeHtml(result.symbolicEquation)}</div>
          </div>

          <div class="field">
            <div class="field-label">Crucible (crucible)</div>
            <div class="field-value code">${escapeHtml(result.crucible)}</div>
          </div>

          <div class="field">
            <div class="field-label">Crucible Description (crucibleDescription)</div>
            <div class="field-value">${result.crucibleDescription}</div>
          </div>
        </div>

        <div class="result-section">
          <h2>🎭 Antagonist</h2>
          
          <div class="field">
            <div class="field-label">Antagonist Braid (antagonist.braid)</div>
            <div class="field-value code">${escapeHtml(result.antagonist.braid)}</div>
          </div>

          <div class="field">
            <div class="field-label">Antagonist Description (antagonist.description)</div>
            <div class="field-value">${result.antagonist.description}</div>
          </div>

          <div class="field">
            <div class="field-label">Antagonist Crucible (antagonist.crucible)</div>
            <div class="field-value code">${escapeHtml(result.antagonist.crucible)}</div>
          </div>

          <div class="field">
            <div class="field-label">Antagonist Archetype (antagonist.archetype)</div>
            <div class="field-value">${result.antagonist.archetype}</div>
          </div>

          <div class="field">
            <div class="field-label">Antagonist Archetype Description (antagonist.archetypeDescription)</div>
            <div class="field-value">${result.antagonist.archetypeDescription}</div>
          </div>

          <div class="field">
            <div class="field-label">Antagonist Resonance (antagonist.resonance)</div>
            <div class="field-value">${result.antagonist.resonance}</div>
          </div>

          <div class="field">
            <div class="field-label">Antagonist Resonance Meaning (antagonist.resonanceMeaning)</div>
            <div class="field-value">${result.antagonist.resonanceMeaning}</div>
          </div>
        </div>

        <div class="result-section">
          <h2>🌀 Braid Interpretation</h2>
          
          <div class="field">
            <div class="field-label">Braid Functions (braid) - ${result.braid.length} items</div>
            <div class="braid-list">
              ${result.braid.map((b) => {
                const interpreter = new TauTongueInterpreter();
                const microCrucible = interpreter.getMicroCrucible(b.equation);
                
                let narrativePalette = null;
                try {
                  narrativePalette = interpreter.extractNarrativePalette(b.equation);
                } catch (e) {
                  console.warn('Could not extract narrative palette:', e);
                }
                
                let textureList = '';
                if (narrativePalette) {
                  const allFunctions = [
                    { function: narrativePalette.dominant, weight: narrativePalette.dominantWeight },
                    ...narrativePalette.texture
                  ];
                  textureList = allFunctions.map(t => 
                    `${t.function}(${Math.round(t.weight * 100)}%)`
                  ).join(', ');
                }
                
                return `
                  <div class="braid-item${b.hasInflectionPoint ? ' has-inflection' : ''}">
                    ${narrativePalette ? `<div class="braid-dominant">${narrativePalette.dominant.toUpperCase()}</div>` : ''}
                    <div class="braid-equation">
                      ${b.hasInflectionPoint ? '<strong>' : ''}${escapeHtml(b.equation)}${b.hasInflectionPoint ? ' (Inflection Point)</strong>' : ''}
                    </div>
                    <div class="braid-description">${b.description}</div>
                    ${microCrucible ? `<div class="braid-micro-crucible"><strong>Micro-Crucible:</strong> <code>${escapeHtml(microCrucible)}</code></div>` : ''}
                    ${textureList ? `<div class="braid-texture"><span class="braid-texture-label">Narrative Texture:</span><span class="texture-item">${textureList}</span></div>` : ''}
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        </div>

        <div class="result-section">
          <h2>💫 Inflection Points</h2>
          
          <div class="field">
            <div class="field-label">Interference Patterns (inflectionPoints) - ${result.inflectionPoints.length} items</div>
            ${result.inflectionPoints.length > 0 ? `
              <div class="inflection-list">
                ${result.inflectionPoints.map(ip => `
                  <div class="inflection-item">
                    Braid ${ip.braidIndex + 1}, Position ${ip.digitIndex + 1}: 
                    Digit <strong>${ip.digit}</strong> resonates with interference wave <strong>${ip.interferenceDigit}</strong>
                  </div>
                `).join('')}
              </div>
            ` : `
              <div class="inflection-empty">No interference patterns detected</div>
            `}
          </div>
        </div>

        <div class="result-section">
          <h2>📖 Interpretation</h2>
          
          <div class="field">
            <div class="field-label">Symbolic Interpretation (interpretation)</div>
            <div class="field-value" style="white-space: pre-line;">${escapeHtml(result.interpretation)}</div>
          </div>

          <div class="field">
            <div class="field-label">Narrative Interpretation (narrativeInterpretation)</div>
            <div class="field-value" style="white-space: pre-line;">${escapeHtml(result.narrativeInterpretation)}</div>
          </div>
        </div>
      `;

      output.innerHTML = html;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Set default spark for demo
    sparkInput.value = "The journey of a thousand miles begins with a single step";
  </script>
</body>
</html>
